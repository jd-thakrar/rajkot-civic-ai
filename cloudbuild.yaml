steps:
  - name: gcr.io/cloud-builders/docker
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/rmc-seva-api:$COMMIT_SHA', '.']

  - name: gcr.io/cloud-builders/docker
    args: ['push', 'gcr.io/$PROJECT_ID/rmc-seva-api:$COMMIT_SHA']

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - rmc-seva-api
      - --image=gcr.io/$PROJECT_ID/rmc-seva-api:$COMMIT_SHA
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated
      - --set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest,GOOGLE_MAPS_API_KEY=GOOGLE_MAPS_API_KEY:latest
      - --set-env-vars=FIREBASE_PROJECT_ID=$PROJECT_ID,NODE_ENV=production

images:
  - gcr.io/$PROJECT_ID/rmc-seva-api:$COMMIT_SHA
